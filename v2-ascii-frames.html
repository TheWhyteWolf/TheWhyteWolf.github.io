<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Projects and experiments by Whyte Erminae — TTRPG tools, ASCII art, plugins and standalone software.">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#121412">
<title>maykstuff — Whyte Erminae</title>
<style>
  *{box-sizing:border-box}
  :root{
    --bg:#121412; --fg:#7b8c5a; --glow:#a4c94b; --dim:#39412b; --panel:#171a14;
  }
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--fg);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Courier New",monospace;
    min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
  }
  #life{
    position:fixed; inset:0; margin:0; z-index:0;
    color:var(--fg); opacity:.10;
    font-size:15px; line-height:16px; white-space:pre; overflow:hidden;
    pointer-events:none; user-select:none;
  }
  main{ position:relative; z-index:1; max-width:1080px; margin:0 auto;
        padding:clamp(1.8rem,4vw,4rem) clamp(1rem,3vw,2rem); }

  header{ text-align:center; margin-bottom:clamp(2rem,5vw,3.4rem); }
  .brand{ font-size:clamp(1.5rem,4vw,2.4rem); letter-spacing:.35em; text-transform:uppercase;
          margin:0; font-weight:700; color:var(--glow); text-shadow:0 0 14px rgba(164,201,75,.3); }
  .cursor{ display:inline-block; width:.6ch; background:var(--glow); color:transparent;
           animation:blink 1.1s steps(1) infinite; }
  @keyframes blink{ 50%{ opacity:0 } }
  .sub{ margin:.7rem 0 0; opacity:.55; font-size:.82rem; letter-spacing:.18em; text-transform:uppercase; }

  .grid{ display:grid; gap:1.6rem 1.4rem; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); align-items:start; }

  .cat{ position:relative; border:1px solid var(--fg); padding:1.9rem 1.4rem 1.4rem; background:transparent; }
  .cat > h2{
    position:absolute; top:0; left:1.1rem; transform:translateY(-52%);
    margin:0; padding:0 .55rem; background:var(--bg);
    font-size:.74rem; letter-spacing:.24em; text-transform:uppercase; font-weight:700; color:var(--glow);
  }
  .cat > h2::before{ content:"┤ "; color:var(--fg); } /* box-drawing brackets on the legend */
  .cat > h2::after { content:" ├"; color:var(--fg); }
  /* corner glyphs for full TUI flavour */
  .cat::before,.cat::after{ position:absolute; color:var(--fg); font-size:1rem; line-height:1; }
  .cat::before{ content:"+"; left:-1px; bottom:-1px; }
  .cat::after { content:"+"; right:-1px; bottom:-1px; }

  ul{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:1rem; }
  .item{ display:block; text-decoration:none; color:inherit; }
  .item .row{ display:flex; align-items:baseline; gap:.5rem; }
  .item .name{ font-weight:700; color:var(--fg); transition:color .2s,text-shadow .2s; }
  .item .name::before{ content:"▸ "; color:var(--glow); opacity:.7; }
  .item:hover .name,.item:focus-visible .name{ color:var(--glow); text-shadow:0 0 10px rgba(164,201,75,.5); }
  .item .desc{ margin:.24rem 0 0 1.2rem; font-size:.8rem; opacity:.6; line-height:1.45; }
  .item:focus-visible{ outline:1px solid var(--glow); outline-offset:3px; }

  .badge{ margin-left:auto; font-size:.66rem; letter-spacing:.08em; opacity:.75; white-space:nowrap; }
  .badge::before{ content:"["; } .badge::after{ content:"]"; }
  .badge--live{ color:var(--glow); opacity:1; }
  .badge--wip{ opacity:.45; }

  footer{ margin-top:2.6rem; text-align:center; font-size:.72rem; opacity:.5; letter-spacing:.1em; }
  footer b{ color:var(--glow); font-weight:400; }
</style>
</head>
<body>
<pre id="life" aria-hidden="true"></pre>

<main>
  <header>
    <h1 class="brand">maykstuff<span class="cursor">_</span></h1>
    <p class="sub">the archive of whyte erminae</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer><b>[live]</b> runs in browser &nbsp;·&nbsp; <b>[src]</b> source repo &nbsp;·&nbsp; <b>[wip]</b> under construction</footer>
</main>

<script src="data.js"></script>
<script>
MAYK.render({ mount:'#grid',
  category:function(c,x){ return '<section class="cat"><h2>'+MAYK.esc(c.name)+'</h2><ul>'+x.itemsHTML+'</ul></section>'; },
  item:function(it){ return '<li><a class="item" href="'+it.url+'" target="_blank" rel="noopener">'
    +'<span class="row"><span class="name">'+MAYK.esc(it.name)+'</span><span class="badge badge--'+it.badge+'">'+it.badge+'</span></span>'
    +'<span class="desc">'+MAYK.esc(it.desc)+'</span></a></li>'; }
});
</script>
<script>
(function(){
  var pre=document.getElementById('life'); if(!pre) return;
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var cols,rows,grid,nxt,cw,ch,tick=0;
  var DENSITY=0.11, ALIVE='#', DEAD=' ', INTERVAL=520, RESEED=520;
  function measure(){
    var cs=getComputedStyle(pre), s=document.createElement('span');
    s.style.cssText='position:absolute;visibility:hidden;white-space:pre';
    s.style.fontFamily=cs.fontFamily; s.style.fontSize=cs.fontSize; s.style.letterSpacing=cs.letterSpacing;
    s.textContent='##########'; document.body.appendChild(s);
    cw=s.getBoundingClientRect().width/10; document.body.removeChild(s);
    ch=parseFloat(cs.lineHeight)||16; if(!cw||cw<1) cw=9;
  }
  function seed(){ grid=new Uint8Array(cols*rows);
    for(var i=0;i<grid.length;i++) grid[i]=Math.random()<DENSITY?1:0; nxt=new Uint8Array(cols*rows); }
  function setup(){ measure();
    cols=Math.max(1,Math.ceil(window.innerWidth/cw)+1);
    rows=Math.max(1,Math.ceil(window.innerHeight/ch)+1); seed(); render(); }
  function step(){
    for(var y=0;y<rows;y++)for(var x=0;x<cols;x++){
      var n=0;
      for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue;
        n+=grid[((y+dy+rows)%rows)*cols+((x+dx+cols)%cols)];
      }
      var a=grid[y*cols+x];
      nxt[y*cols+x]=((a&&(n===2||n===3))||(!a&&n===3))?1:0;
    }
    var t=grid; grid=nxt; nxt=t;
  }
  function render(){ var out='',i=0;
    for(var y=0;y<rows;y++){ var l='';
      for(var x=0;x<cols;x++) l+=grid[i++]?ALIVE:DEAD;
      out+=l+'\n'; } pre.textContent=out; }
  function loop(){ step(); render(); if(++tick%RESEED===0) seed(); }
  setup();
  var rt; window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(setup,250); });
  if(!reduce) setInterval(loop,INTERVAL);
})();
</script>
</body>
</html>
