<title>maykstuff</title>
<style>
  html,body{ margin:0; height:100%; background:#121412; }
  .wait{ color:#7b8c5a; font-family:ui-monospace,Menlo,Consolas,"Courier New",monospace;
         padding:2rem; font-size:.9rem; letter-spacing:.05em; }
  .wait a{ color:#a4c94b; }
</style>
<script>
/* ── Day-by-day rotation ──────────────────────────────────────────────
   One design per calendar day, cycling through this list.
   Add or reorder filenames here to change what appears in the rotation.
   Preview any entry with ?i=0, ?i=1, …  ·  preview another day with ?o=1 (tomorrow), ?o=-1 (yesterday). */
(function(){
  var ROTATION = [
    'v2-ascii-frames.html',   // 0
    'v4-directory.html',      // 1
    'v5-bbs.html',            // 2
    'v6-turbo-vision.html',   // 3
    'v7-greenbar.html',       // 4
    'v8-crt.html',            // 5
    'v9-teletype.html'        // 6
  ];
  try{
    var p = new URLSearchParams(location.search);
    var n = ROTATION.length;
    var forced = p.get('i');
    var offset = parseInt(p.get('o'),10); if(isNaN(offset)) offset = 0;
    var d = new Date();
    var dayNum = Math.floor(new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime()/86400000) + offset;
    var idx = (forced!==null && forced!=='') ? parseInt(forced,10) : dayNum;
    if(isNaN(idx)) idx = dayNum;
    idx = ((idx % n) + n) % n;
    location.replace(ROTATION[idx]);
  }catch(e){ /* fall through to the no-script list below */ }
})();
</script>
</head>
<body>
  <noscript class="wait">

    </p>

</body>
